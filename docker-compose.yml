services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: openoncall
      POSTGRES_PASSWORD: openoncall
      POSTGRES_DB: openoncall
    volumes:
      - db_data:/var/lib/postgresql/data
    # Published on 5433 (not the default 5432) so it doesn't collide with a
    # Postgres you might already have running locally -- lets host-side
    # tooling (a local `manage.py`, psql, a GUI client) reach this same
    # database. Container-to-container traffic (the web/worker/beat
    # services) still uses the internal `db:5432` address regardless.
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openoncall"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    # Same reasoning as db's port above -- 6380 to avoid colliding with a
    # local Redis.
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    command: celery -A config worker -l info

  beat:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"

volumes:
  db_data:
